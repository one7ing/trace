<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${title}">学习计划</title>
    <style>
        @page {
            size: A4;
            margin: 50px 60px;
        }

        body {
            font-family: 'SimSun', 'STSong', 'Microsoft YaHei', serif;
            font-size: 12pt;
            line-height: 1.8;
            color: #333333;
        }

        h1 {
            font-size: 20pt;
            text-align: center;
            border-bottom: 2px solid #4A90D9;
            padding-bottom: 14px;
            margin-bottom: 28px;
            color: #1a1a1a;
        }

        h2 {
            font-size: 16pt;
            color: #2C5F8A;
            margin-top: 30px;
            margin-bottom: 12px;
            border-left: 4px solid #4A90D9;
            padding-left: 12px;
        }

        h3 {
            font-size: 14pt;
            color: #3A7BBF;
            margin-top: 22px;
            margin-bottom: 8px;
        }

        h4 {
            font-size: 12pt;
            font-weight: bold;
            margin-top: 16px;
            margin-bottom: 6px;
        }

        ul, ol {
            margin-left: 24px;
            margin-bottom: 12px;
        }

        li {
            margin-bottom: 6px;
        }

        p {
            margin: 10px 0;
        }

        strong {
            color: #222222;
        }

        blockquote {
            border-left: 4px solid #4A90D9;
            background: #f7f9fc;
            padding: 12px 18px;
            margin: 18px 0;
            color: #555555;
        }

        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 10pt;
        }

        pre {
            background: #f5f5f5;
            padding: 14px 18px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            overflow-x: auto;
            font-size: 10pt;
        }

        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 24px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }

        th, td {
            border: 1px solid #d0d0d0;
            padding: 8px 12px;
            text-align: left;
        }

        th {
            background: #4A90D9;
            color: white;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            font-size: 9pt;
            color: #999999;
            margin-top: 50px;
            border-top: 1px solid #dddddd;
            padding-top: 14px;
        }
    </style>
</head>
<body>

<h1 th:text="${title}">学习计划</h1>

<div th:utext="${contentHtml}">
    <!-- AI 生成的 Markdown 内容将在此处渲染为 HTML -->
</div>

<p class="footer">由 Trace AI 生成</p>

</body>
</html>
